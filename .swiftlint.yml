included:
  - Sources
  - Tests
  - libs

excluded:
  - build
  - build_nobase
  - build_noent
  - build_quickaction_verify
  - dist

disabled_rules:
  # SwiftFormat owns formatting details. Keep SwiftLint focused on code issues
  # instead of fighting the formatter on brace and collection style.
  - opening_brace
  - trailing_comma

identifier_name:
  min_length:
    warning: 1
    error: 1

line_length:
  warning: 220
  error: 500

file_length:
  warning: 2000
  error: 3000

type_body_length:
  warning: 1000
  error: 2000

function_body_length:
  warning: 120
  error: 300

function_parameter_count:
  warning: 8
  error: 12

cyclomatic_complexity:
  warning: 20
  error: 50

large_tuple:
  warning: 4
  error: 6
